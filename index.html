<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UrbanStyle</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<header>
    <h1>UrbanStyle</h1>
    <input type="text" id="buscador" placeholder="Buscar ropa...">
</header>

<section id="carrito">
    <h2>🛒 Carrito</h2>
    <ul id="listaCarrito"></ul>
    <p id="total"></p>
    <button onclick="enviarWhatsApp()">Enviar pedido</button>
</section>

<div class="contenedor">
    
    <aside>
        <h2>Filtros</h2>

        <label>Categoría</label>
        <select id="categoria">
            <option value="todos">Todos</option>
            <option value="playera">Playeras</option>
            <option value="pantalon">Pantalones</option>
            <option value="gorra">Gorras</option>
        </select>

        <label>Precio máximo</label>
        <input type="range" id="precio" min="0" max="2000" step="100">
        <span id="valorPrecio"></span>
    </aside>

    <main id="productos"></main>

</div>

<script src="productos.js"></script>
</body>
</html>
